name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x', '24.x']

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # n8n-workflow drags in `isolated-vm`, a native module we never execute
      # (it's only needed for its TypeScript types at build time and for
      # `NodeOperationError` at runtime). Skipping install scripts avoids a
      # slow, brittle native compile on the runner.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    # Only run when the secrets are available (skipped on forks).
    if: ${{ vars.E2E_ENABLED == 'true' }}
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Start n8n
        run: |
          docker compose up -d
          # Wait until n8n is accepting requests
          timeout 60 bash -c 'until curl -sf http://localhost:5678/healthz; do sleep 2; done'

      - name: Create credential and import workflows
        env:
          ENTERSPEED_SOURCE_API_KEY: ${{ secrets.ENTERSPEED_SOURCE_API_KEY }}
          ENTERSPEED_ENVIRONMENT_API_KEY: ${{ secrets.ENTERSPEED_ENVIRONMENT_API_KEY }}
          N8N_CONTAINER: n8n-nodes-enterspeed-n8n-1
        run: node scripts/setup.mjs

      - name: Execute workflow
        run: |
          WORKFLOW_ID=$(docker exec n8n-nodes-enterspeed-n8n-1 \
            n8n export:workflow --all 2>/dev/null | \
            node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d)[0].id)")
          docker exec n8n-nodes-enterspeed-n8n-1 n8n execute:workflow --id="$WORKFLOW_ID"

      - name: Stop n8n
        if: always()
        run: docker compose down
